<!DOCTYPE html>
<html lang="ko">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>유교전 현장 추첨 시스템</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
   
   <script>
       // 기본 데이터 (로직용) - '다음 기회에' -> '행운의 참가상'으로 변경
       const DEFAULT_ITEMS = [
           { id: 1, name: "튼튼영어 베이비리그", stock: 5, days: ["목", "금", "토", "일"] },
           { id: 2, name: "그레이트북스 세트", stock: 10, days: ["토", "일"] },
           { id: 3, name: "아람 전집", stock: 8, days: ["목", "금"] },
           { id: 4, name: "키즈에이원 세트", stock: 15, days: ["목", "토"] },
           { id: 5, name: "매직큐브 큐블로", stock: 20, days: ["금", "일"] },
           { id: 6, name: "동아제약 미니막스", stock: 50, days: ["목", "금", "토", "일"] },
           { id: 7, name: "행운의 참가상", stock: 9999, days: ["목", "금", "토", "일"] }
       ];

       const WHEEL_DESIGN_COLORS = ["#FFB800", "#FFD600", "#FFE082", "#FFF176", "#FFB800", "#FFD600", "#FFE082", "#FFF176"];

       window.items = DEFAULT_ITEMS;
       window.currentDay = "목";
       window.isFirebaseReady = false;
       let isSpinning = false;
       let currentRotation = 0; 
   </script>

   <script type="module">
       import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
       import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
       import { getFirestore, doc, getDoc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

       let firebaseConfig = null;
       if (typeof __firebase_config !== 'undefined' && __firebase_config) {
           firebaseConfig = JSON.parse(__firebase_config);
       }

       if (firebaseConfig) {
           const app = initializeApp(firebaseConfig);
           const auth = getAuth(app);
           const db = getFirestore(app);
           const appId = typeof __app_id !== 'undefined' ? __app_id : 'educare-pc-station-v2';

           window.db = db;
           window.appId = appId;
           window.fsDoc = doc;
           window.fsUpdateDoc = updateDoc;
           window.fsSetDoc = setDoc;

           const initAuth = async () => {
               if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                   await signInWithCustomToken(auth, __initial_auth_token);
               } else {
                   await signInAnonymously(auth);
               }
           };
           initAuth();

           onAuthStateChanged(auth, (user) => {
               if (user) {
                   window.isFirebaseReady = true;
                   const docRef = doc(db, 'artifacts', appId, 'public', 'data');
                   onSnapshot(docRef, (snap) => {
                       if (snap.exists()) {
                           const data = snap.data();
                           window.items = data.items || DEFAULT_ITEMS;
                           window.currentDay = data.currentDay || "목";
                       } else {
                           setDoc(docRef, { items: DEFAULT_ITEMS, currentDay: "목" });
                       }
                       renderAdminList();
                   });
               }
           });
       } else {
           window.onload = () => { renderAdminList(); };
       }
   </script>

   <style>
       @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
       
       :root {
           --main-yellow: #FFB800;
           --bg-soft: #FEFDF5;
           --text-black: #111111;
       }

       body {
           font-family: 'Pretendard', sans-serif;
           background-color: var(--bg-soft);
           color: var(--text-black);
           margin: 0;
           padding: 0;
           overflow: hidden;
           letter-spacing: -0.04em;
           height: 100vh;
           width: 100vw;
       }

       .pc-layout {
           height: 100vh;
           display: flex;
           flex-direction: column;
           align-items: center;
           justify-content: center;
           gap: 5vh;
           position: relative;
           background-image: radial-gradient(rgba(255,184,0,0.07) 2.5px, transparent 2.5px);
           background-size: 60px 60px;
       }

       .top-header {
           text-align: center;
           z-index: 10;
       }

       .event-badge {
           display: inline-block;
           background-color: var(--text-black);
           color: white;
           padding: 1.2vh 3.5vw;
           border-radius: 100px;
           font-size: min(1.8vw, 24px);
           font-weight: 800;
           letter-spacing: 0.1em;
           margin-bottom: 2vh;
           box-shadow: 0 10px 30px rgba(0,0,0,0.15);
       }

       .top-header h1 {
           font-size: min(4.8vw, 72px);
           font-weight: 900;
           line-height: 1.1;
           margin-bottom: 2vh;
           color: #111;
           word-break: keep-all;
       }

       .sub-info {
           font-size: min(1.7vw, 26px);
           font-weight: 800;
           color: var(--main-yellow);
           background: white;
           padding: 0.8vh 2.5vw;
           border-radius: 15px;
           display: inline-block;
           box-shadow: 0 5px 20px rgba(0,0,0,0.06);
           border: 2px solid rgba(255, 184, 0, 0.3);
       }

       /* 룰렛 정원 유지를 위한 aspect-ratio 적용 */
       #wheel-container {
           position: relative;
           width: min(65vh, 85vw); 
           aspect-ratio: 1 / 1; /* 가로세로 비율 고정 */
           filter: drop-shadow(0 40px 100px rgba(0,0,0,0.18));
       }

       #wheel {
           width: 100%;
           height: 100%;
           border-radius: 50%;
           border: min(2vh, 20px) solid var(--text-black);
           position: relative;
           overflow: hidden;
           transition: transform 2s cubic-bezier(0.15, 0, 0.05, 1);
           background: white;
       }

       .segment {
           position: absolute;
           width: 50%;
           height: 50%;
           transform-origin: 100% 100%;
           border: 0.5px solid rgba(255,255,255,0.2);
       }

       .needle {
           position: absolute;
           top: -3vh;
           left: 50%;
           transform: translateX(-50%);
           width: 5.5vh;
           height: 7.5vh;
           z-index: 100;
           filter: drop-shadow(0 8px 15px rgba(0,0,0,0.3));
       }

       .center-cap {
           position: absolute;
           top: 50%;
           left: 50%;
           transform: translate(-50%, -50%);
           width: 18vh;
           height: 18vh;
           background: white;
           border: min(1vh, 10px) solid var(--text-black);
           border-radius: 50%;
           z-index: 150;
           display: flex;
           align-items: center;
           justify-content: center;
           box-shadow: 0 5px 25px rgba(0,0,0,0.2);
       }

       .spin-btn {
           background-color: var(--main-yellow);
           color: var(--text-black);
           font-weight: 900;
           font-size: min(2.4vh, 24px);
           width: 14.5vh;
           height: 14.5vh;
           border-radius: 50%;
           display: flex;
           align-items: center;
           justify-content: center;
           text-align: center;
           line-height: 1.2;
           padding: 10px;
           transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
           box-shadow: 0 10px 20px rgba(255, 184, 0, 0.4);
           cursor: pointer;
           border: none;
           word-break: keep-all;
           z-index: 160;
       }

       .spin-btn:hover:not(:disabled) {
           transform: scale(1.1);
           filter: brightness(1.05);
       }

       .spin-btn:disabled {
           display: none;
       }

       .instruction-text {
           color: #BBB;
           font-weight: 800;
           font-size: min(1.4vw, 20px);
       }

       .result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 184, 0, 0.99);
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
       }
       .result-overlay.active { display: flex; animation: winShow 0.5s cubic-bezier(0.19, 1, 0.22, 1); }

       @keyframes winShow {
           from { opacity: 0; transform: scale(0.7); }
           to { opacity: 1; transform: scale(1); }
       }

       .admin-trigger {
           position: absolute;
           top: 30px;
           right: 30px;
           color: rgba(0,0,0,0.25);
           background: rgba(0,0,0,0.04);
           width: 50px;
           height: 50px;
           display: flex;
           align-items: center;
           justify-content: center;
           border-radius: 50%;
           font-size: 28px;
           cursor: pointer;
           z-index: 100;
           transition: all 0.3s ease;
       }
       
       .admin-box {
           background: white;
           width: min(90%, 750px);
           max-height: 90vh;
           border-radius: 40px;
           padding: 40px;
           overflow-y: auto;
       }
       .modal {
           display: none;
           position: fixed;
           top: 0; left: 0; width: 100%; height: 100%;
           background: rgba(0, 0, 0, 0.85);
           backdrop-filter: blur(15px);
           z-index: 9999;
           justify-content: center;
           align-items: center;
       }
       .modal.active { display: flex; }
   </style>
</head>
<body>

   <div class="pc-layout">
       <div onclick="openAdmin()" class="admin-trigger" title="설정">
           <i class="fas fa-cog"></i>
       </div>

       <div class="top-header">
           <div class="event-badge">서울국제유아교육전&키즈페어</div>
           <h1>행운 가득! 럭키드로우 이벤트</h1>
           <p class="sub-info">사전등록자 한정 혜택 (1인 1회 참여)</p>
       </div>

       <div id="wheel-container">
           <div class="needle">
               <svg viewBox="0 0 40 55" fill="var(--text-black)">
                   <path d="M20 55L40 0H0L20 55Z"/>
               </svg>
           </div>
           
           <div class="center-cap">
               <button id="spin-btn" onclick="spin()" class="spin-btn">경품추첨<br>START!</button>
           </div>

           <div id="wheel">
               <script>
                   const wheel = document.getElementById('wheel');
                   const segCount = 8;
                   const step = 360 / segCount;
                   WHEEL_DESIGN_COLORS.forEach((color, i) => {
                       const seg = document.createElement('div');
                       seg.className = 'segment';
                       seg.style.backgroundColor = color;
                       seg.style.width = '50%';
                       seg.style.height = '50%';
                       seg.style.position = 'absolute';
                       seg.style.transformOrigin = '100% 100%';
                       seg.style.transform = `rotate(${step * i}deg) skewY(${90 - step}deg)`;
                       wheel.appendChild(seg);
                   });
               </script>
           </div>
       </div>

       <div class="bottom-info">
           <div class="instruction-text">버튼을 눌러서 추첨을 진행해 주세요.</div>
       </div>
   </div>

   <!-- 결과 안내 오버레이 -->
   <div id="result-overlay" class="result-overlay" onclick="closeResult()">
       <div class="text-[min(12vh,140px)] mb-2 animate-bounce">🎊</div>
       <h2 class="text-[min(6vh,72px)] font-black text-black mb-6">당첨을 축하드립니다!</h2>
       <div class="bg-white px-24 py-14 rounded-[70px] shadow-2xl mb-12 transform scale-105 border-[12px] border-black max-w-[85vw]">
           <p id="win-item-name" class="text-[min(9vh,100px)] font-black text-black leading-tight break-keep"></p>
       </div>
       <p class="text-[min(3vh,32px)] font-bold text-black opacity-60">스페이스바 / 엔터 또는 화면을 클릭하면 닫힙니다.</p>
   </div>

   <div id="admin-login-modal" class="modal">
       <div class="bg-white p-12 rounded-[40px] w-[400px] text-center shadow-2xl">
           <h3 class="font-black text-2xl mb-8">관리자 인증</h3>
           <input type="password" id="admin-pass" class="w-full bg-gray-50 border-2 border-gray-100 p-5 rounded-2xl mb-6 text-center font-bold text-2xl outline-none focus:border-[var(--main-yellow)]" placeholder="PIN CODE">
           <button onclick="checkAdminPass()" class="w-full bg-black text-white py-5 rounded-2xl font-black text-xl">확인</button>
           <button onclick="closeModal('admin-login-modal')" class="w-full mt-4 text-gray-400 font-bold">닫기</button>
       </div>
   </div>

   <div id="admin-settings-modal" class="modal">
       <div class="admin-box">
           <div class="flex justify-between items-center mb-8">
               <h3 class="font-black text-3xl text-black">현장 운영 설정</h3>
               <button onclick="closeModal('admin-settings-modal')"><i class="fas fa-times text-2xl text-gray-400"></i></button>
           </div>
           <p class="mb-6 text-gray-500 font-bold">* 룰렛 디자인은 8등분으로 고정되어 있으며, 추첨 로직만 아래 리스트를 따릅니다.</p>
           <div class="mb-8">
               <label class="block text-xs font-black text-gray-400 mb-3 uppercase">현재 운영 요일 설정</label>
               <div class="flex gap-2">
                   <div onclick="changeGlobalDay('목')" id="day-목" class="day-btn text-center p-4 rounded-xl font-bold cursor-pointer flex-1 bg-gray-100">목요일</div>
                   <div onclick="changeGlobalDay('금')" id="day-금" class="day-btn text-center p-4 rounded-xl font-bold cursor-pointer flex-1 bg-gray-100">금요일</div>
                   <div onclick="changeGlobalDay('토')" id="day-토" class="day-btn text-center p-4 rounded-xl font-bold cursor-pointer flex-1 bg-gray-100">토요일</div>
                   <div onclick="changeGlobalDay('일')" id="day-일" class="day-btn text-center p-4 rounded-xl font-bold cursor-pointer flex-1 bg-gray-100">일요일</div>
               </div>
           </div>
           <div id="admin-item-list" class="space-y-4 mb-6"></div>
           <button onclick="addItem()" class="w-full bg-gray-50 py-4 mb-4 rounded-2xl font-black text-gray-400 border border-dashed border-gray-200">+ 새 경품 추가</button>
           <button onclick="saveData()" class="w-full bg-[var(--main-yellow)] py-5 rounded-3xl font-black text-2xl shadow-xl">설정 저장 후 적용</button>
       </div>
   </div>

   <script>
       window.addEventListener('keydown', (e) => {
           if (e.code === 'Space' || e.code === 'Enter') {
               if (document.activeElement.tagName === 'INPUT') return;
               const overlay = document.getElementById('result-overlay');
               if (overlay.classList.contains('active')) {
                   closeResult();
                   e.preventDefault();
                   return;
               }
               if (!isSpinning && !document.querySelector('.modal.active')) {
                   spin();
                   e.preventDefault();
               }
           }
       });

       function renderAdminList() {
           document.querySelectorAll('.day-btn').forEach(btn => {
               btn.classList.toggle('active', btn.id === `day-${window.currentDay}`);
               btn.style.backgroundColor = btn.id === `day-${window.currentDay}` ? 'var(--main-yellow)' : '#F3F4F6';
           });

           const list = document.getElementById('admin-item-list');
           list.innerHTML = window.items.map((item, i) => `
               <div class="p-6 bg-gray-50 rounded-3xl border border-gray-100">
                   <div class="flex gap-4 mb-4">
                       <input type="text" value="${item.name}" oninput="window.items[${i}].name=this.value" class="flex-1 bg-white border border-gray-200 p-3 rounded-xl font-bold text-lg outline-none" placeholder="경품명">
                       <input type="number" value="${item.stock}" oninput="window.items[${i}].stock=parseInt(this.value)" class="w-24 bg-white border border-gray-200 p-3 rounded-xl font-bold text-lg text-center outline-none" placeholder="재고">
                       <button onclick="removeItem(${i})" class="text-gray-300 hover:text-red-500 px-2"><i class="fas fa-trash"></i></button>
                   </div>
                   <div class="flex gap-2">
                       ${['목','금','토','일'].map(d => `
                           <button onclick="toggleItemDay(${i}, '${d}')" class="flex-1 py-2 rounded-lg font-bold text-xs border transition-all ${item.days.includes(d) ? 'bg-black text-white border-black' : 'bg-white text-gray-300 border-gray-100'}">${d}</button>
                       `).join('')}
                   </div>
               </div>
           `).join('');
       }

       async function spin() {
           if (isSpinning) return;
           const activeItems = window.items.filter(it => it.stock > 0 && it.days.includes(window.currentDay));
           if (activeItems.length === 0) { 
               alert(`[${window.currentDay}요일] 준비된 경품 재고가 모두 소진되었습니다.`); 
               return; 
           }
           isSpinning = true;
           const spinBtn = document.getElementById('spin-btn');
           spinBtn.disabled = true; 
           
           const totalStock = activeItems.reduce((acc, it) => acc + it.stock, 0);
           let rand = Math.floor(Math.random() * totalStock);
           let winner = activeItems[0];
           let acc = 0;
           for (let it of activeItems) {
               acc += it.stock;
               if (rand < acc) { winner = it; break; }
           }
           const extraSpins = 15; 
           const randomStopAngle = Math.floor(Math.random() * 360); 
           currentRotation += (extraSpins * 360) + randomStopAngle;
           const wheel = document.getElementById('wheel');
           wheel.style.transition = 'transform 2s cubic-bezier(0.15, 0, 0.05, 1)';
           wheel.style.transform = `rotate(${currentRotation}deg)`;
           
           setTimeout(async () => {
               confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#FFB800', '#000000', '#FFFFFF'] });
               document.getElementById('win-item-name').innerText = winner.name;
               document.getElementById('result-overlay').classList.add('active');
               const updatedItems = window.items.map(it => it.id === winner.id ? {...it, stock: it.stock - 1} : it);
               if (window.isFirebaseReady) {
                   const ref = window.fsDoc(window.db, 'artifacts', window.appId, 'public', 'data');
                   await window.fsUpdateDoc(ref, { items: updatedItems, currentDay: window.currentDay });
               } else {
                   window.items = updatedItems;
                   renderAdminList();
               }
           }, 2100); 
       }

       function openAdmin() { document.getElementById('admin-login-modal').classList.add('active'); }
       function checkAdminPass() {
           if (document.getElementById('admin-pass').value === '8887') {
               closeModal('admin-login-modal');
               document.getElementById('admin-pass').value = '';
               document.getElementById('admin-settings-modal').classList.add('active');
               renderAdminList();
           } else { alert('PIN 코드가 틀립니다.'); }
       }
       function closeModal(id) { document.getElementById(id).classList.remove('active'); }
       
       function closeResult() {
           document.getElementById('result-overlay').classList.remove('active');
           currentRotation %= 360;
           const wheel = document.getElementById('wheel');
           wheel.style.transition = 'none';
           wheel.style.transform = `rotate(${currentRotation}deg)`;
           
           const spinBtn = document.getElementById('spin-btn');
           spinBtn.disabled = false;
           isSpinning = false;
       }
       
       function changeGlobalDay(d) { window.currentDay = d; renderAdminList(); }
       function toggleItemDay(idx, d) {
           const days = window.items[idx].days;
           window.items[idx].days = days.includes(d) ? days.filter(x => x !== d) : [...days, d];
           renderAdminList();
       }
       function addItem() {
           window.items.push({ id: Date.now(), name: "새 경품", stock: 10, days: ["목","금","토","일"] });
           renderAdminList();
       }
       function removeItem(i) {
           if(confirm('이 항목을 삭제하시겠습니까?')) {
               window.items.splice(i, 1);
               renderAdminList();
           }
       }
       async function saveData() {
           if (window.isFirebaseReady) {
               const ref = window.fsDoc(window.db, 'artifacts', window.appId, 'public', 'data');
               await window.fsSetDoc(ref, { items: window.items, currentDay: window.currentDay });
               alert('저장되었습니다.');
           } else { alert('로컬 반영 완료'); }
           closeModal('admin-settings-modal');
       }
   </script>
</body>
</html>
