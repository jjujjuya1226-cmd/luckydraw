<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>유교전 럭키드로우</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        // 기본 데이터 설정
        const DEFAULT_ITEMS = [
            { id: 1, name: "튼튼영어 베이비리그", stock: 5, color: "#fff4d1", days: ["목", "금", "토", "일"] },
            { id: 2, name: "그레이트북스 세트", stock: 10, color: "#ffebad", days: ["토", "일"] },
            { id: 3, name: "아람 전집", stock: 8, color: "#ffe18a", days: ["목", "금"] },
            { id: 4, name: "키즈에이원 세트", stock: 15, color: "#ffd866", days: ["목", "토"] },
            { id: 5, name: "매직큐브 큐블로", stock: 20, color: "#ffcf42", days: ["금", "일"] },
            { id: 6, name: "동아제약 미니막스", stock: 50, color: "#ffc51a", days: ["목", "금", "토", "일"] },
            { id: 7, name: "참가상", stock: 2000, color: "#f3f4f6", days: ["목", "금", "토", "일"] }
        ];

        window.items = DEFAULT_ITEMS;
        window.currentDay = "목";
        window.isFirebaseReady = false; 
        let isSpinning = false;
        let hasParticipated = localStorage.getItem('lucky_draw_participated') === 'true';
    </script>

    <!-- 실시간 데이터 동기화 엔진 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 외부 배포를 위한 설정값 처리
        let firebaseConfig;
        try {
            // Canvas 환경인지 외부 환경인지 체크
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            } else {
                // [중요] GitHub 배포 시 아래 주석을 풀고 본인의 Firebase 설정값을 넣어야 합니다.
                /*
                firebaseConfig = {
                    apiKey: "YOUR_API_KEY",
                    authDomain: "YOUR_PROJECT.firebaseapp.com",
                    projectId: "YOUR_PROJECT_ID",
                    storageBucket: "YOUR_PROJECT.appspot.com",
                    messagingSenderId: "YOUR_SENDER_ID",
                    appId: "YOUR_APP_ID"
                };
                */
                // 설정값이 없을 경우를 위한 방어 코드
                throw new Error("Firebase 설정값이 없습니다.");
            }
        } catch (e) {
            console.error("Firebase 초기화 실패:", e);
            document.getElementById('spin-button-text').innerText = "설정 오류 (관리자 문의)";
        }

        if (firebaseConfig) {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'lucky-draw-v1';

            window.db = db;
            window.appId = appId;
            window.auth = auth;
            window.fsDoc = doc;
            window.fsSetDoc = setDoc;
            window.fsUpdateDoc = updateDoc;

            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("인증 오류:", error);
                    document.getElementById('spin-button-text').innerText = "인증 오류";
                }
            };

            initAuth();

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    window.currentUser = user;
                    window.isFirebaseReady = true; 
                    
                    const settingsDocRef = doc(db, 'artifacts', appId, 'public', 'data');
                    
                    onSnapshot(settingsDocRef, (docSnap) => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            window.items = data.items || DEFAULT_ITEMS;
                            window.currentDay = data.currentDay || "목";
                        } else {
                            setDoc(settingsDocRef, { items: DEFAULT_ITEMS, currentDay: "목" });
                        }
                        renderWheel();
                        updateAdminUI();
                        checkParticipation();
                    }, (error) => {
                        console.error("동기화 오류:", error);
                        // 권한 오류(Firestore rules) 발생 시 안내
                        if (error.code === 'permission-denied') {
                            document.getElementById('spin-button-text').innerText = "DB 접근 권한 없음";
                        }
                    });
                }
            });
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .main-yellow { background-color: #FFB800; }
        
        #wheel-outer-wrapper {
            padding-top: 10px;
            padding-bottom: 10px;
            position: relative;
            background: radial-gradient(circle at center, rgba(255, 184, 0, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        #wheel-container {
            position: relative;
            width: 70vw; 
            height: 70vw;
            max-width: 280px;
            max-height: 280px;
            margin: 0 auto;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.15));
            z-index: 10;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #222; 
            position: relative;
            overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            background: white;
            z-index: 10;
        }

        .segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            border: 0.5px solid rgba(0,0,0,0.05);
        }

        .needle {
            position: absolute;
            top: -10px; 
            left: 50%;
            transform: translateX(-50%);
            width: 34px;
            height: 42px;
            z-index: 50;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.2));
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.active { display: flex; opacity: 1; }
        .modal-content {
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 90%;
            max-width: 400px;
        }
        .modal.active .modal-content { transform: scale(1); }

        .admin-day-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 12px;
            transition: all 0.2s;
            border: 2px solid #eee;
            background: white;
            color: #ccc;
        }
        .admin-day-btn.active {
            border-color: #FFB800;
            background: #FFB800;
            color: white;
        }

        .main-card {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: 2rem;
            overflow: hidden;
            border: 6px solid #FFB800; 
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

    <div class="main-card">
        <div class="main-yellow pt-6 pb-5 px-5 text-center relative">
            <h1 class="text-white text-xl sm:text-2xl font-black leading-tight drop-shadow-md">
                서울국제유아교육전<br>& 키즈페어
            </h1>
            <div class="inline-block mt-2 px-5 py-1 bg-black/10 rounded-full border border-white/10">
                <p id="display-day-text" class="text-white text-[10px] font-black tracking-widest uppercase">LUCKY DRAW EVENT</p>
            </div>
        </div>

        <div class="p-6 text-center bg-white relative">
            <div class="mb-4">
                <p class="text-[#FFB800] text-[10px] font-black mb-0.5 tracking-wider uppercase">사전등록자 한정 혜택 (1인 1회)</p>
                <h2 class="text-lg sm:text-xl font-black text-gray-800 tracking-tighter">행운의 룰렛을 돌려보세요!</h2>
            </div>

            <div id="wheel-outer-wrapper">
                <div id="wheel-container">
                    <div id="needle" class="needle">
                        <svg viewBox="0 0 40 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 50L40 0H0L20 50Z" fill="#FF4D4D"/>
                        </svg>
                    </div>
                    <div id="wheel" style="transform: rotate(0deg);"></div>
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-white rounded-full border-[4px] border-[#222] z-30 shadow-md"></div>
                </div>
            </div>

            <button id="spin-button" onclick="spin()" disabled class="w-full mt-8 main-yellow disabled:bg-gray-300 text-white text-lg font-black py-5 rounded-2xl shadow-[0_6px_0_#D99C00] active:shadow-none active:translate-y-[6px] transition-all">
                <span id="spin-button-text">시스템 연결 중...</span>
            </button>

            <div class="text-left bg-gray-50 p-5 rounded-2xl border border-gray-100 mt-6">
                <div class="flex items-center mb-3">
                    <span class="text-lg mr-2">🎁</span>
                    <h3 class="font-black text-gray-800 text-sm">경품 리스트</h3>
                </div>
                <div id="inventory-list" class="grid grid-cols-1 gap-2 max-h-40 overflow-y-auto pr-2"></div>
            </div>
        </div>
        
        <div class="bg-gray-100/50 py-3 px-6 flex justify-between items-center border-t border-gray-100">
            <p class="text-[9px] text-gray-400 font-bold tracking-wider">© (주)세계전람</p>
            <button onclick="openAdmin()" class="text-gray-200 hover:text-[#FFB800]"><i class="fas fa-cog text-xs"></i></button>
        </div>
    </div>

    <!-- 관리자 로그인 모달 -->
    <div id="admin-login-modal" class="modal">
        <div class="modal-content bg-white p-8 rounded-3xl shadow-2xl border-4 border-[#FFB800]">
            <h3 class="font-black text-center mb-4">관리자 인증</h3>
            <input type="password" id="admin-pass" pattern="\d*" inputmode="numeric" class="w-full border-2 p-3 rounded-xl mb-4 text-center tracking-[0.5em]" placeholder="****">
            <button onclick="checkAdminPass()" class="w-full main-yellow text-white py-3 rounded-xl font-black">확인</button>
        </div>
    </div>

    <!-- 관리자 설정 모달 -->
    <div id="admin-settings-modal" class="modal">
        <div class="modal-content bg-white p-6 rounded-3xl w-full max-h-[85vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-black">전체 설정 변경</h3>
                <button onclick="closeModal('admin-settings-modal')"><i class="fas fa-times-circle text-gray-300 text-xl"></i></button>
            </div>
            <div class="flex gap-1 mb-6">
                <button onclick="changeGlobalDay('목')" id="admin-day-목" class="admin-day-btn">목</button>
                <button onclick="changeGlobalDay('금')" id="admin-day-금" class="admin-day-btn">금</button>
                <button onclick="changeGlobalDay('토')" id="admin-day-토" class="admin-day-btn">토</button>
                <button onclick="changeGlobalDay('일')" id="admin-day-일" class="admin-day-btn">일</button>
            </div>
            <div id="admin-item-list" class="space-y-3"></div>
            <div class="mt-6 flex gap-2 sticky bottom-0 bg-white py-3 border-t">
                <button onclick="addItem()" class="flex-1 bg-gray-100 py-3 rounded-lg font-black text-xs">항목 추가</button>
                <button id="admin-save-btn" onclick="saveData()" class="flex-1 main-yellow text-white py-3 rounded-lg font-black text-xs shadow-md">저장 (전체 기기 반영)</button>
            </div>
            <button onclick="resetParticipation()" class="w-full mt-4 text-red-400 text-[10px] font-bold">이 기기 참여 기록 초기화</button>
        </div>
    </div>

    <!-- 당첨 결과 모달 -->
    <div id="win-modal" class="modal">
        <div class="modal-content bg-white p-8 rounded-[3rem] text-center shadow-2xl border-[8px] border-[#FFB800]">
            <div class="text-5xl mb-4 animate-bounce">✨</div>
            <h2 class="text-xl font-black mb-1">축하합니다!</h2>
            <div class="bg-yellow-50 py-6 rounded-2xl border-2 border-dashed border-[#FFB800] my-4">
                <p id="win-item-name" class="text-lg font-black text-[#E6A600] px-4"></p>
            </div>
            <button onclick="closeModal('win-modal')" class="w-full bg-black text-white py-4 rounded-2xl font-black text-sm">확인</button>
        </div>
    </div>

    <script>
        function checkParticipation() {
            const btn = document.getElementById('spin-button');
            const btnText = document.getElementById('spin-button-text');
            
            if (!window.isFirebaseReady) {
                // 이 텍스트가 안바뀐다면 위 script type="module" 블록의 에러 로그를 확인해야 함
                return;
            }

            if (hasParticipated) {
                btn.disabled = true;
                btnText.innerText = "이미 참여 완료되었습니다";
            } else {
                btn.disabled = false;
                btnText.innerText = "추첨 START!";
            }
        }

        function renderWheel() {
            const wheel = document.getElementById('wheel');
            if (!wheel) return;
            wheel.innerHTML = '';
            
            const total = window.items.length;
            if (total === 0) return;
            
            const step = 360 / total;
            window.items.forEach((item, index) => {
                const seg = document.createElement('div');
                seg.className = 'segment';
                seg.style.backgroundColor = item.color;
                seg.style.transform = `rotate(${step * index}deg) skewY(${90 - step}deg)`;
                wheel.appendChild(seg);
            });

            document.getElementById('inventory-list').innerHTML = window.items.map(item => `
                <div class="flex justify-between items-center py-3 px-4 bg-white rounded-lg border border-gray-100">
                    <span class="text-[12px] font-bold text-gray-700">${item.name}</span>
                </div>
            `).join('');
        }

        async function spin() {
            if (!window.isFirebaseReady) return;
            if (isSpinning || hasParticipated || !window.items.length) return;
            
            const activeItems = window.items.filter(item => item.stock > 0 && item.days.includes(window.currentDay));
            if (activeItems.length === 0) { alert('오늘 참여 가능한 경품 재고가 없습니다.'); return; }

            isSpinning = true;
            const wheel = document.getElementById('wheel');
            const btnText = document.getElementById('spin-button-text');
            document.getElementById('spin-button').disabled = true;

            const totalStock = activeItems.reduce((s, i) => s + i.stock, 0);
            let rand = Math.floor(Math.random() * totalStock);
            let winner = activeItems[0];
            let acc = 0;
            for (let i = 0; i < activeItems.length; i++) {
                acc += activeItems[i].stock;
                if (rand < acc) { winner = activeItems[i]; break; }
            }

            const winnerIdx = window.items.findIndex(it => it.id === winner.id);
            const step = 360 / window.items.length;
            const spins = 10;
            const rotation = (spins * 360) - (winnerIdx * step) - (step / 2);
            
            wheel.style.transform = `rotate(${rotation}deg)`;

            setTimeout(async () => {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, zIndex: 10000 });
                document.getElementById('win-item-name').innerText = winner.name;
                document.getElementById('win-modal').classList.add('active');
                
                const newItems = window.items.map(it => it.id === winner.id ? {...it, stock: it.stock - 1} : it);
                try {
                    const settingsDocRef = window.fsDoc(window.db, 'artifacts', window.appId, 'public', 'data');
                    await window.fsUpdateDoc(settingsDocRef, { items: newItems });
                } catch (e) { console.error("재고 업데이트 실패:", e); }
                
                hasParticipated = true;
                localStorage.setItem('lucky_draw_participated', 'true');
                isSpinning = false;
                btnText.innerText = "이미 참여 완료되었습니다";
            }, 5200);
        }

        function openAdmin() { 
            document.getElementById('admin-login-modal').classList.add('active'); 
            document.getElementById('admin-pass').focus();
        }

        function checkAdminPass() {
            if (document.getElementById('admin-pass').value === '8887') {
                closeModal('admin-login-modal');
                document.getElementById('admin-pass').value = '';
                showSettings();
            } else { alert('비밀번호 오류'); }
        }

        function showSettings() {
            updateAdminUI();
            const list = document.getElementById('admin-item-list');
            list.innerHTML = window.items.map((item, i) => `
                <div class="p-3 bg-gray-50 rounded-xl border">
                    <input type="text" value="${item.name}" oninput="window.items[${i}].name = this.value" class="w-full p-2 mb-2 rounded border font-bold text-xs">
                    <div class="flex justify-between items-center">
                        <div class="flex gap-1">
                            ${['목', '금', '토', '일'].map(d => `
                                <button onclick="toggleDay(${i}, '${d}')" class="w-7 h-7 rounded text-[10px] font-black border ${item.days.includes(d) ? 'bg-black text-[#FFB800]' : 'bg-white text-gray-300'}">${d}</button>
                            `).join('')}
                        </div>
                        <div class="flex items-center gap-1">
                            <span class="text-[9px] font-bold text-gray-400">재고:</span>
                            <input type="number" value="${item.stock}" oninput="window.items[${i}].stock = parseInt(this.value)" class="w-12 p-1 text-center font-black text-xs border rounded">
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('admin-settings-modal').classList.add('active');
        }

        function toggleDay(idx, day) {
            const currentDays = window.items[idx].days;
            if (currentDays.includes(day)) {
                window.items[idx].days = currentDays.filter(d => d !== day);
            } else { window.items[idx].days.push(day); }
            showSettings();
        }

        async function changeGlobalDay(day) {
            window.currentDay = day;
            updateAdminUI();
        }

        function updateAdminUI() {
            document.querySelectorAll('.admin-day-btn').forEach(btn => {
                btn.classList.toggle('active', btn.id === `admin-day-${window.currentDay}`);
            });
        }

        function addItem() {
            window.items.push({ id: Date.now(), name: "새 경품", stock: 10, color: "#f3f4f6", days: ["목", "금", "토", "일"] });
            showSettings();
        }

        async function saveData() {
            if (!window.isFirebaseReady) return;
            const btn = document.getElementById('admin-save-btn');
            btn.disabled = true;
            try {
                const settingsDocRef = window.fsDoc(window.db, 'artifacts', window.appId, 'public', 'data');
                await window.fsSetDoc(settingsDocRef, { items: window.items, currentDay: window.currentDay });
                alert("저장되었습니다.");
                closeModal('admin-settings-modal');
            } catch (e) { alert("저장 실패"); } finally { btn.disabled = false; }
        }

        function resetParticipation() {
            localStorage.removeItem('lucky_draw_participated');
            hasParticipated = false;
            alert('기록 초기화 완료');
            closeModal('admin-settings-modal');
            checkParticipation();
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
