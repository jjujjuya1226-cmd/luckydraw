<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유교전 현장 추첨 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        // 기본 데이터 (로직용) - '행운의 참가상' 포함
        const DEFAULT_ITEMS = [
            { id: 1, name: "튼튼영어 베이비리그", stock: 5, days: ["목", "금", "토", "일"] },
            { id: 2, name: "그레이트북스 세트", stock: 10, days: ["토", "일"] },
            { id: 3, name: "아람 전집", stock: 8, days: ["목", "금"] },
            { id: 4, name: "키즈에이원 세트", stock: 15, days: ["목", "토"] },
            { id: 5, name: "매직큐브 큐블로", stock: 20, days: ["금", "일"] },
            { id: 6, name: "동아제약 미니막스", stock: 50, days: ["목", "금", "토", "일"] },
            { id: 7, name: "행운의 참가상", stock: 9999, days: ["목", "금", "토", "일"] }
        ];

        const WHEEL_DESIGN_COLORS = ["#FFB800", "#FFD600", "#FFE082", "#FFF176", "#FFB800", "#FFD600", "#FFE082", "#FFF176"];

        window.items = DEFAULT_ITEMS;
        window.currentDay = "목";
        window.isFirebaseReady = false;
        let isSpinning = false;
        let currentRotation = 0; 
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let firebaseConfig = null;
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            firebaseConfig = JSON.parse(__firebase_config);
        }

        if (firebaseConfig) {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'educare-pc-station-v3';

            window.db = db;
            window.appId = appId;
            window.fsDoc = doc;
            window.fsUpdateDoc = updateDoc;
            window.fsSetDoc = setDoc;

            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    window.isFirebaseReady = true;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data');
                    onSnapshot(docRef, (snap) => {
                        if (snap.exists()) {
                            const data = snap.data();
                            window.items = data.items || DEFAULT_ITEMS;
                            window.currentDay = data.currentDay || "목";
                        } else {
                            setDoc(docRef, { items: DEFAULT_ITEMS, currentDay: "목" });
                        }
                        renderAdminList();
                    });
                }
            });
        } else {
            window.onload = () => { renderAdminList(); };
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        :root {
            --main-yellow: #FFB800;
            --bg-soft: #FFFDF0; 
            --text-black: #111111;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-soft);
            color: var(--text-black);
            margin: 0;
            padding: 0;
            overflow: hidden;
            letter-spacing: -0.04em;
            height: 100vh;
            width: 100vw;
        }

        /* 클로버 배경 애니메이션 */
        .bg-clover-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .clover {
            position: absolute;
            bottom: -50px;
            color: #4ADE80; 
            opacity: 0.15;
            animation: floatUp 15s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        .pc-layout {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* 전체 간격 균등 분배 */
            padding: 8vh 0 12vh 0; /* 상단과 하단 여백 설정 */
            position: relative;
            z-index: 1;
            background-image: radial-gradient(rgba(255,184,0,0.05) 1.5px, transparent 1.5px);
            background-size: 40px 40px;
        }

        .top-header {
            text-align: center;
            z-index: 10;
        }

        .top-header h1 {
            font-size: min(4.5vw, 68px);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 2.5vh;
            color: #111;
            word-break: keep-all;
            text-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .sub-info {
            font-size: min(1.6vw, 24px);
            font-weight: 800;
            color: #EAB308;
            background: white;
            padding: 1.2vh 3vw;
            border-radius: 100px;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 2px solid rgba(255, 184, 0, 0.2);
            word-break: keep-all;
        }

        #wheel-container {
            position: relative;
            width: min(58vh, 75vw); 
            aspect-ratio: 1 / 1;
            filter: drop-shadow(0 40px 100px rgba(0,0,0,0.15));
            margin: 2vh 0;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: min(1.5vh, 16px) solid var(--text-black);
            position: relative;
            overflow: hidden;
            transition: transform 2s cubic-bezier(0.15, 0, 0.05, 1);
            background: white;
        }

        .segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            border: 0.5px solid rgba(255,255,255,0.2);
        }

        .needle {
            position: absolute;
            top: -2.5vh;
            left: 50%;
            transform: translateX(-50%);
            width: 5vh;
            height: 7vh;
            z-index: 100;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.3));
        }

        .center-cap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 17vh;
            height: 17vh;
            background: white;
            border: min(0.8vh, 8px) solid var(--text-black);
            border-radius: 50%;
            z-index: 150;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 25px rgba(0,0,0,0.15);
        }

        .spin-btn {
            background-color: var(--main-yellow);
            color: var(--text-black);
            font-weight: 900;
            font-size: min(2.0vh, 20px);
            width: 13.5vh;
            height: 13.5vh;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.2;
            padding: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(255, 184, 0, 0.3);
            cursor: pointer;
            border: none;
            word-break: keep-all;
            z-index: 160;
        }

        .spin-btn:hover:not(:disabled) {
            transform: scale(1.08);
            filter: brightness(1.05);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .bottom-info {
            z-index: 10;
        }

        .instruction-text {
            color: #AAA; 
            font-weight: 700;
            font-size: min(1.4vw, 20px);
        }

        .result-overlay {
             display: none;
             position: fixed;
             top: 0; left: 0; width: 100%; height: 100%;
             background: rgba(255, 184, 0, 0.98);
             z-index: 10000;
             flex-direction: column;
             justify-content: center;
             align-items: center;
             text-align: center;
             padding: 20px;
        }
        .result-overlay.active { display: flex; animation: winShow 0.5s cubic-bezier(0.19, 1, 0.22, 1); }

        @keyframes winShow {
            from { opacity: 0; transform: scale(0.7); }
            to { opacity: 1; transform: scale(1); }
        }

        .admin-trigger {
            position: absolute;
            top: 30px;
            right: 30px;
            color: rgba(0,0,0,0.15);
            background: rgba(0,0,0,0.03);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 22px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- 클로버 배경 -->
    <div id="bg-clovers" class="bg-clover-container"></div>

    <div class="pc-layout">
        <div onclick="openAdmin()" class="admin-trigger" title="설정">
            <i class="fas fa-cog"></i>
        </div>

        <div class="top-header">
            <!-- 요청하신 '이벤트' 문구 추가 -->
            <h1>행운 가득! 럭키드로우 이벤트</h1>
            <p class="sub-info">유교전 사전등록자 한정 (1인 1회 참여)</p>
        </div>

        <div id="wheel-container">
            <div class="needle">
                <svg viewBox="0 0 40 55" fill="var(--text-black)">
                    <path d="M20 55L40 0H0L20 55Z"/>
                </svg>
            </div>
            
            <div class="center-cap">
                <button id="spin-btn" onclick="spin()" class="spin-btn">경품추첨<br>START!</button>
            </div>

            <div id="wheel">
                <!-- Segments generated via JS -->
            </div>
        </div>

        <div class="bottom-info">
            <!-- 위치를 더 위로 올리기 위해 padding-bottom이 포함된 부모 컨테이너 내부에 배치 -->
            <div class="instruction-text">START 버튼을 눌러 행운을 확인하세요!</div>
        </div>
    </div>

    <div id="result-overlay" class="result-overlay" onclick="closeResult()">
        <div class="text-[min(10vh,120px)] mb-2 animate-bounce">🍀</div>
        <h2 class="text-[min(5vh,60px)] font-black text-black mb-6">축하합니다!</h2>
        <div class="bg-white px-16 py-12 rounded-[50px] shadow-2xl mb-10 transform scale-105 border-[8px] border-black max-w-[85vw]">
            <p id="win-item-name" class="text-[min(8vh,90px)] font-black text-black leading-tight break-keep"></p>
        </div>
        <p class="text-[min(2.5vh,26px)] font-bold text-black opacity-40">화면을 클릭하면 창이 닫힙니다.</p>
    </div>

    <!-- Modals -->
    <div id="admin-login-modal" class="modal fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-[9999]">
        <div class="bg-white p-10 rounded-3xl w-[360px] text-center shadow-2xl">
            <h3 class="font-black text-xl mb-6">관리자 인증</h3>
            <input type="password" id="admin-pass" class="w-full bg-gray-50 border-2 border-gray-100 p-4 rounded-xl mb-6 text-center font-bold text-xl outline-none focus:border-[var(--main-yellow)]" placeholder="PIN CODE">
            <button onclick="checkAdminPass()" class="w-full bg-black text-white py-4 rounded-xl font-black">확인</button>
            <button onclick="closeModal('admin-login-modal')" class="w-full mt-4 text-gray-400 text-sm">취소</button>
        </div>
    </div>

    <div id="admin-settings-modal" class="modal fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-[9999]">
        <div class="bg-white w-[min(90%,700px)] max-h-[85vh] rounded-3xl p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-2xl">운영 설정</h3>
                <button onclick="closeModal('admin-settings-modal')"><i class="fas fa-times text-xl text-gray-400"></i></button>
            </div>
            <div class="mb-6">
                <label class="block text-[10px] font-black text-gray-400 mb-2 uppercase">운영 요일</label>
                <div class="flex gap-2">
                    <div onclick="changeGlobalDay('목')" id="day-목" class="day-btn text-center p-3 rounded-lg font-bold cursor-pointer flex-1 bg-gray-100 text-sm">목요일</div>
                    <div onclick="changeGlobalDay('금')" id="day-금" class="day-btn text-center p-3 rounded-lg font-bold cursor-pointer flex-1 bg-gray-100 text-sm">금요일</div>
                    <div onclick="changeGlobalDay('토')" id="day-토" class="day-btn text-center p-3 rounded-lg font-bold cursor-pointer flex-1 bg-gray-100 text-sm">토요일</div>
                    <div onclick="changeGlobalDay('일')" id="day-일" class="day-btn text-center p-3 rounded-lg font-bold cursor-pointer flex-1 bg-gray-100 text-sm">일요일</div>
                </div>
            </div>
            <div id="admin-item-list" class="space-y-3 mb-6"></div>
            <button onclick="addItem()" class="w-full bg-gray-50 py-3 mb-4 rounded-xl font-bold text-gray-400 border border-dashed border-gray-200">+ 경품 추가</button>
            <button onclick="saveData()" class="w-full bg-[var(--main-yellow)] py-4 rounded-2xl font-black text-xl shadow-lg">저장 및 적용</button>
        </div>
    </div>

    <script>
        function createClovers() {
            const container = document.getElementById('bg-clovers');
            const count = 15;
            for (let i = 0; i < count; i++) {
                const clover = document.createElement('i');
                clover.className = 'fas fa-clover clover';
                clover.style.left = Math.random() * 100 + 'vw';
                clover.style.fontSize = (Math.random() * 20 + 20) + 'px';
                clover.style.animationDelay = Math.random() * 15 + 's';
                clover.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(clover);
            }
        }
        createClovers();

        const wheel = document.getElementById('wheel');
        const segCount = 8;
        const step = 360 / segCount;
        WHEEL_DESIGN_COLORS.forEach((color, i) => {
            const seg = document.createElement('div');
            seg.className = 'segment';
            seg.style.backgroundColor = color;
            seg.style.transform = `rotate(${step * i}deg) skewY(${90 - step}deg)`;
            wheel.appendChild(seg);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                if (document.activeElement.tagName === 'INPUT') return;
                const overlay = document.getElementById('result-overlay');
                if (overlay.classList.contains('active')) {
                    closeResult();
                    e.preventDefault();
                    return;
                }
                if (!isSpinning && !document.querySelector('.modal:not(.hidden)')) {
                    spin();
                    e.preventDefault();
                }
            }
        });

        function renderAdminList() {
            document.querySelectorAll('.day-btn').forEach(btn => {
                const isActive = btn.id === `day-${window.currentDay}`;
                btn.style.backgroundColor = isActive ? 'var(--main-yellow)' : '#F3F4F6';
                btn.style.color = isActive ? 'black' : '#999';
            });

            const list = document.getElementById('admin-item-list');
            list.innerHTML = window.items.map((item, i) => `
                <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                    <div class="flex gap-3 mb-3">
                        <input type="text" value="${item.name}" oninput="window.items[${i}].name=this.value" class="flex-1 bg-white border border-gray-200 p-2 rounded-lg font-bold outline-none text-sm" placeholder="경품명">
                        <input type="number" value="${item.stock}" oninput="window.items[${i}].stock=parseInt(this.value)" class="w-16 bg-white border border-gray-200 p-2 rounded-lg font-bold text-center outline-none text-sm" placeholder="재고">
                        <button onclick="removeItem(${i})" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="flex gap-1">
                        ${['목','금','토','일'].map(d => `
                            <button onclick="toggleItemDay(${i}, '${d}')" class="flex-1 py-1 rounded-md font-bold text-[10px] border transition-all ${item.days.includes(d) ? 'bg-black text-white border-black' : 'bg-white text-gray-300 border-gray-100'}">${d}</button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function spin() {
            if (isSpinning) return;
            const activeItems = window.items.filter(it => it.stock > 0 && it.days.includes(window.currentDay));
            if (activeItems.length === 0) { 
                alert(`[${window.currentDay}요일] 준비된 경품이 모두 소진되었습니다.`); 
                return; 
            }
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true; 
            
            const totalStock = activeItems.reduce((acc, it) => acc + it.stock, 0);
            let rand = Math.floor(Math.random() * totalStock);
            let winner = activeItems[0];
            let acc = 0;
            for (let it of activeItems) {
                acc += it.stock;
                if (rand < acc) { winner = it; break; }
            }

            const extraSpins = 12; 
            const randomStopAngle = Math.floor(Math.random() * 360); 
            currentRotation += (extraSpins * 360) + randomStopAngle;
            
            const wheelEl = document.getElementById('wheel');
            wheelEl.style.transition = 'transform 2.5s cubic-bezier(0.15, 0, 0.05, 1)';
            wheelEl.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(async () => {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#FFB800', '#4ADE80', '#FFFFFF'] });
                document.getElementById('win-item-name').innerText = winner.name;
                document.getElementById('result-overlay').classList.add('active');
                
                const updatedItems = window.items.map(it => it.id === winner.id ? {...it, stock: it.stock - 1} : it);
                if (window.isFirebaseReady) {
                    const ref = window.fsDoc(window.db, 'artifacts', window.appId, 'public', 'data');
                    await window.fsUpdateDoc(ref, { items: updatedItems, currentDay: window.currentDay });
                } else {
                    window.items = updatedItems;
                    renderAdminList();
                }
            }, 2600); 
        }

        function openAdmin() { document.getElementById('admin-login-modal').classList.remove('hidden'); document.getElementById('admin-login-modal').classList.add('flex'); }
        function checkAdminPass() {
            if (document.getElementById('admin-pass').value === '8887') {
                closeModal('admin-login-modal');
                document.getElementById('admin-pass').value = '';
                document.getElementById('admin-settings-modal').classList.remove('hidden');
                document.getElementById('admin-settings-modal').classList.add('flex');
                renderAdminList();
            } else { alert('PIN 코드가 틀립니다.'); }
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
        
        function closeResult() {
            document.getElementById('result-overlay').classList.remove('active');
            currentRotation %= 360;
            const wheelEl = document.getElementById('wheel');
            wheelEl.style.transition = 'none';
            wheelEl.style.transform = `rotate(${currentRotation}deg)`;
            document.getElementById('spin-btn').disabled = false;
            isSpinning = false;
        }
        
        function changeGlobalDay(d) { window.currentDay = d; renderAdminList(); }
        function toggleItemDay(idx, d) {
            const days = window.items[idx].days;
            window.items[idx].days = days.includes(d) ? days.filter(x => x !== d) : [...days, d];
            renderAdminList();
        }
        function addItem() {
            window.items.push({ id: Date.now(), name: "새 경품", stock: 10, days: ["목","금","토","일"] });
            renderAdminList();
        }
        function removeItem(i) {
            if(confirm('삭제하시겠습니까?')) {
                window.items.splice(i, 1);
                renderAdminList();
            }
        }
        async function saveData() {
            if (window.isFirebaseReady) {
                const ref = window.fsDoc(window.db, 'artifacts', window.appId, 'public', 'data');
                await window.fsSetDoc(ref, { items: window.items, currentDay: window.currentDay });
                alert('저장되었습니다.');
            } else { alert('로컬에 저장되었습니다.'); }
            closeModal('admin-settings-modal');
        }
    </script>
</body>
</html>
