<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>유교전 럭키드로우</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .main-yellow { background-color: #FFB800; }
        
        #wheel-outer-wrapper {
            padding-top: 10px;
            padding-bottom: 10px;
            position: relative;
            background: radial-gradient(circle at center, rgba(255, 184, 0, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .wheel-bg-deco {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 85%;
            border: 1px dashed rgba(255, 184, 0, 0.2);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        #wheel-container {
            position: relative;
            width: 70vw; 
            height: 70vw;
            max-width: 280px;
            max-height: 280px;
            margin: 0 auto;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.15));
            z-index: 10;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #222; 
            position: relative;
            overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            background: white;
            z-index: 10;
        }

        #wheel.spinning {
            filter: blur(1px);
        }

        .segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            border: 0.5px solid rgba(0,0,0,0.03);
        }

        .needle {
            position: absolute;
            top: -10px; 
            left: 50%;
            transform: translateX(-50%);
            width: 34px;
            height: 42px;
            z-index: 50;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.2));
        }

        .needle.tick {
            animation: tick-anim 0.12s ease-out;
        }

        @keyframes tick-anim {
            0% { transform: translateX(-50%) rotate(0deg); }
            50% { transform: translateX(-50%) rotate(-15deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 15px;
        }

        .modal.active { display: flex; opacity: 1; }

        .modal-content {
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 100%;
            max-width: 380px;
        }

        .modal.active .modal-content { transform: scale(1); }

        .shine {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, transparent 45%, rgba(255,255,255,0.1) 50%, transparent 55%);
            background-size: 300% 300%;
            animation: shine-anim 8s infinite linear;
            pointer-events: none;
        }

        @keyframes shine-anim {
            0% { background-position: 200% 200%; }
            100% { background-position: -200% -200%; }
        }

        .admin-day-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 12px;
            transition: all 0.2s;
            border: 2px solid #eee;
            background: white;
            color: #ccc;
        }
        .admin-day-btn.active {
            border-color: #FFB800;
            background: #FFB800;
            color: white;
        }

        .main-card {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: 2rem;
            overflow: hidden;
            border: 6px solid #FFB800; 
            position: relative;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15);
        }

        /* 경품 리스트 스크롤 영역 추가 */
        #inventory-list-container {
            max-height: 180px;
            overflow-y: auto;
            padding-right: 4px;
        }
        #inventory-list-container::-webkit-scrollbar {
            width: 4px;
        }
        #inventory-list-container::-webkit-scrollbar-thumb {
            background-color: #FFB800;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-2 sm:p-4 flex flex-col items-center justify-center min-h-screen">

    <div class="main-card">
        <div class="shine"></div>
        
        <!-- 헤더 -->
        <div class="main-yellow pt-6 pb-5 px-5 text-center relative">
            <h1 class="text-white text-xl sm:text-2xl font-black leading-tight tracking-tight drop-shadow-md">
                서울국제유아교육전<br>& 키즈페어
            </h1>
            <div class="inline-block mt-2 px-5 py-1 bg-black/10 rounded-full border border-white/10 backdrop-blur-sm">
                <p id="display-day-text" class="text-white text-[10px] font-black tracking-widest uppercase">LUCKY DRAW</p>
            </div>
        </div>

        <!-- 메인 콘텐츠 -->
        <div class="p-4 sm:p-6 text-center bg-white relative">
            <div class="mb-3 sm:mb-4">
                <p class="text-[#FFB800] text-[10px] font-black mb-0.5 tracking-wider uppercase">사전등록자 한정 혜택(1인 1회 참여)</p>
                <h2 class="text-lg sm:text-xl font-black text-gray-800 tracking-tighter">행운의 룰렛을 돌려보세요!</h2>
            </div>

            <!-- 룰렛 영역 -->
            <div id="wheel-outer-wrapper">
                <div class="wheel-bg-deco"></div>
                <div id="wheel-container">
                    <div id="needle" class="needle">
                        <svg viewBox="0 0 40 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 50L40 0H0L20 50Z" fill="#FF4D4D"/>
                            <circle cx="20" cy="15" r="5" fill="white" fill-opacity="0.3"/>
                        </svg>
                    </div>
                    <div id="wheel" style="transform: rotate(0deg);"></div>
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-white rounded-full border-[4px] border-[#222] z-30 shadow-md flex items-center justify-center">
                        <div class="w-2 h-2 bg-[#FFB800] rounded-full shadow-inner animate-pulse"></div>
                    </div>
                </div>
            </div>

            <!-- 추첨 버튼 -->
            <button id="spin-button" onclick="spin()" class="w-full mt-6 sm:mt-8 main-yellow hover:bg-[#e6a600] disabled:bg-gray-300 disabled:shadow-none disabled:translate-y-0 text-white text-lg sm:text-xl font-black py-4 sm:py-5 rounded-2xl shadow-[0_6px_0_#D99C00] active:shadow-none active:translate-y-[6px] mb-6 transition-all group relative overflow-hidden">
                <span id="spin-button-text" class="relative z-10">추첨 START!</span>
                <div class="absolute top-0 -left-full w-full h-full bg-white/20 skew-x-12 transition-all duration-1000 group-hover:left-full"></div>
            </button>

            <!-- 경품 리스트 (모바일 다 안보이는 문제 해결을 위한 스크롤 컨테이너) -->
            <div class="text-left bg-gray-50 p-4 sm:p-5 rounded-2xl border border-gray-100 shadow-inner">
                <div class="flex items-center mb-3">
                    <span class="text-lg mr-2">🎁</span>
                    <h3 class="font-black text-gray-800 text-sm sm:text-base">경품 리스트</h3>
                </div>
                <div id="inventory-list-container">
                    <div id="inventory-list" class="grid grid-cols-1 gap-2"></div>
                </div>
            </div>
        </div>
        
        <!-- 푸터 -->
        <div class="bg-gray-100/50 py-3 px-6 flex justify-between items-center border-t border-gray-100">
            <p class="text-[9px] text-gray-400 font-bold tracking-wider">© 2026 (주)세계전람. All rights reserved.</p>
            <button onclick="openAdmin()" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-200 hover:text-[#FFB800] transition-all">
                <i class="fas fa-cog text-xs"></i>
            </button>
        </div>
    </div>

    <!-- 관리자 로그인 모달 -->
    <div id="admin-login-modal" class="modal">
        <div class="modal-content bg-white p-6 sm:p-10 rounded-3xl shadow-2xl border-4 border-[#FFB800]">
            <h3 class="font-black text-base text-center mb-4">관리자 인증</h3>
            <input type="password" id="admin-pass" pattern="\d*" inputmode="numeric" class="w-full bg-gray-50 border-2 border-gray-100 p-3 rounded-xl mb-4 text-center text-xl tracking-[0.4em] focus:outline-none focus:border-[#FFB800]" placeholder="****">
            <button onclick="checkAdminPass()" class="w-full main-yellow text-white py-3 rounded-xl font-black shadow-lg text-sm">확인</button>
        </div>
    </div>

    <!-- 관리자 설정 모달 -->
    <div id="admin-settings-modal" class="modal">
        <div class="modal-content bg-white p-5 sm:p-8 rounded-3xl w-full max-w-2xl max-h-[80vh] overflow-y-auto m-2 shadow-2xl">
            <div class="mb-6 p-4 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200">
                <h4 class="text-center font-black text-gray-400 text-[10px] mb-3 uppercase tracking-widest">운영 설정 및 초기화</h4>
                <div class="flex gap-1 mb-4">
                    <button onclick="changeGlobalDay('목')" id="admin-day-목" class="admin-day-btn">목</button>
                    <button onclick="changeGlobalDay('금')" id="admin-day-금" class="admin-day-btn">금</button>
                    <button onclick="changeGlobalDay('토')" id="admin-day-토" class="admin-day-btn">토</button>
                    <button onclick="changeGlobalDay('일')" id="admin-day-일" class="admin-day-btn">일</button>
                </div>
                
                <!-- 재참여 가능하게 되돌리는 기능 -->
                <button onclick="resetParticipation()" class="w-full bg-red-50 text-red-500 py-3 rounded-xl font-black text-[11px] border border-red-100 hover:bg-red-100 transition-colors">
                    <i class="fas fa-undo mr-1"></i> 현재 기기 참여 기록 초기화 (재참여 가능)
                </button>
                <p class="text-[9px] text-gray-400 text-center mt-2">고객 실수/스태프 실수 시 클릭하면 다시 추첨이 가능해집니다.</p>
            </div>

            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-black">경품 설정</h3>
                <button onclick="closeModal('admin-settings-modal')" class="text-gray-300"><i class="fas fa-times-circle text-xl"></i></button>
            </div>
            
            <div id="admin-item-list" class="space-y-2"></div>

            <div class="mt-6 flex gap-2 sticky bottom-0 bg-white py-3 border-t">
                <button onclick="addItem()" class="flex-1 bg-gray-100 py-3 rounded-lg font-black text-xs">추가</button>
                <button onclick="saveAndReload()" class="flex-1 main-yellow text-white py-3 rounded-lg font-black text-xs shadow-md">저장</button>
            </div>
        </div>
    </div>

    <!-- 당첨 모달 -->
    <div id="win-modal" class="modal">
        <div class="modal-content bg-white p-6 rounded-[3rem] text-center shadow-2xl border-[8px] border-[#FFB800] relative">
            <div class="text-5xl mb-3 animate-bounce">✨</div>
            <h2 class="text-xl font-black mb-0.5 text-gray-800">축하합니다!</h2>
            <p class="text-[10px] font-bold text-gray-400 mb-4">행운의 주인공이 되셨습니다</p>
            <div class="bg-yellow-50 py-6 rounded-2xl border-[2px] border-dashed border-[#FFB800] my-3">
                <p id="win-item-name" class="text-lg font-black text-[#E6A600] px-4 leading-tight"></p>
            </div>
            <button onclick="closeModal('win-modal')" class="w-full bg-black text-white py-3 rounded-2xl font-black text-sm shadow-md active:scale-95 transition-transform">확인</button>
        </div>
    </div>

    <script>
        const DEFAULT_ITEMS = [
            { id: 1, name: "튼튼영어 베이비리그", stock: 5, color: "#fff4d1", days: ["목", "금", "토", "일"] },
            { id: 2, name: "그레이트북스 세트", stock: 10, color: "#ffebad", days: ["토", "일"] },
            { id: 3, name: "아람 전집", stock: 8, color: "#ffe18a", days: ["목", "금"] },
            { id: 4, name: "키즈에이원 세트", stock: 15, color: "#ffd866", days: ["목", "토"] },
            { id: 5, name: "매직큐브 큐블로", stock: 20, color: "#ffcf42", days: ["금", "일"] },
            { id: 6, name: "동아제약 미니막스", stock: 50, color: "#ffc51a", days: ["목", "금", "토", "일"] },
            { id: 7, name: "참가상", stock: 2000, color: "#f3f4f6", days: ["목", "금", "토", "일"] }
        ];

        let items = JSON.parse(localStorage.getItem('lucky_draw_v9_items')) || DEFAULT_ITEMS;
        let currentDay = localStorage.getItem('lucky_draw_v9_day') || "목";
        let isSpinning = false;
        let hasParticipated = localStorage.getItem('lucky_draw_participated') === 'true';

        function checkParticipation() {
            const btn = document.getElementById('spin-button');
            const btnText = document.getElementById('spin-button-text');
            if (hasParticipated) {
                btn.disabled = true;
                btnText.innerText = "이미 참여 완료되었습니다";
            } else {
                btn.disabled = false;
                btnText.innerText = "추첨 START!";
            }
        }

        function resetParticipation() {
            localStorage.removeItem('lucky_draw_participated');
            hasParticipated = false;
            alert('현재 기기의 참여 기록이 초기화되었습니다. 이제 다시 참여할 수 있습니다.');
            closeModal('admin-settings-modal');
            checkParticipation();
            renderWheel();
        }

        function changeGlobalDay(day) {
            currentDay = day;
            localStorage.setItem('lucky_draw_v9_day', day);
            updateDayUI(); 
            renderWheel();
            document.querySelectorAll('.admin-day-btn').forEach(btn => {
                btn.classList.toggle('active', btn.id === `admin-day-${day}`);
            });
        }

        function updateDayUI() {
            document.getElementById('display-day-text').innerText = `LUCKY DRAW EVENT`;
        }

        function renderWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            
            const displayItems = items; 
            const total = displayItems.length;
            
            if (total === 0) {
                wheel.innerHTML = '<div class="flex items-center justify-center h-full text-gray-300 font-black px-6 text-xs leading-tight text-center">경품 등록 필요</div>';
            } else {
                const step = 360 / total;
                displayItems.forEach((item, index) => {
                    const seg = document.createElement('div');
                    seg.className = 'segment';
                    seg.style.backgroundColor = item.color;
                    seg.style.transform = `rotate(${step * index}deg) skewY(${90 - step}deg)`;
                    wheel.appendChild(seg);
                });
            }

            const invList = document.getElementById('inventory-list');
            invList.innerHTML = items.map(item => `
                <div class="flex justify-between items-center py-3 px-5 bg-white rounded-lg border border-gray-100 shadow-sm">
                    <span class="text-[12px] font-black text-gray-700">
                        ${item.name}
                    </span>
                    <div class="flex items-center">
                        <span class="text-[10px] text-gray-400 font-bold">${item.stock > 0 ? '잔여 ' + item.stock : '품절'}</span>
                    </div>
                </div>
            `).join('');
        }

        function spin() {
            if (isSpinning || hasParticipated) return;
            
            const activeItems = items.filter(item => item.stock > 0 && item.days.includes(currentDay));
            if (activeItems.length === 0) {
                alert('현재 참여 가능한 경품 재고가 없습니다.');
                return;
            }

            isSpinning = true;
            const wheel = document.getElementById('wheel');
            const needle = document.getElementById('needle');
            const btn = document.getElementById('spin-button');
            const btnText = document.getElementById('spin-button-text');
            
            btn.disabled = true;
            wheel.classList.add('spinning');

            const totalStock = activeItems.reduce((s, i) => s + i.stock, 0);
            let rand = Math.floor(Math.random() * totalStock);
            let winner = activeItems[0];
            let acc = 0;

            for (let i = 0; i < activeItems.length; i++) {
                acc += activeItems[i].stock;
                if (rand < acc) {
                    winner = activeItems[i];
                    break;
                }
            }

            const displayItems = items;
            const winnerIdx = displayItems.findIndex(it => it.id === winner.id);
            const step = 360 / displayItems.length;
            
            const spins = 10 + Math.floor(Math.random() * 5);
            const rotation = (spins * 360) - (winnerIdx * step) - (step / 2);
            
            wheel.style.transform = `rotate(${rotation}deg)`;

            const tickInterval = setInterval(() => {
                needle.classList.add('tick');
                setTimeout(() => needle.classList.remove('tick'), 100);
            }, 250);

            setTimeout(() => {
                clearInterval(tickInterval);
                wheel.classList.remove('spinning');
                confetti({ 
                    particleCount: 80, spread: 50, origin: { y: 0.6 }, 
                    colors: ['#FFB800', '#ffffff', '#FF4D4D'], zIndex: 10000 
                });
                
                document.getElementById('win-item-name').innerText = winner.name;
                document.getElementById('win-modal').classList.add('active');
                
                items = items.map(it => it.id === winner.id ? {...it, stock: it.stock - 1} : it);
                localStorage.setItem('lucky_draw_v9_items', JSON.stringify(items));
                
                hasParticipated = true;
                localStorage.setItem('lucky_draw_participated', 'true');
                
                setTimeout(() => {
                    renderWheel(); 
                    isSpinning = false;
                    btnText.innerText = "이미 참여 완료되었습니다";
                }, 500);
            }, 5200);
        }

        function openAdmin() { 
            document.getElementById('admin-login-modal').classList.add('active'); 
            document.getElementById('admin-pass').focus();
        }

        function checkAdminPass() {
            if (document.getElementById('admin-pass').value === '8887') {
                closeModal('admin-login-modal');
                document.getElementById('admin-pass').value = '';
                showSettings();
            } else { alert('비밀번호가 다릅니다.'); }
        }

        function toggleDay(idx, day) {
            const currentDays = items[idx].days;
            if (currentDays.includes(day)) {
                items[idx].days = currentDays.filter(d => d !== day);
            } else {
                items[idx].days.push(day);
            }
            showSettings();
        }

        function showSettings() {
            document.querySelectorAll('.admin-day-btn').forEach(btn => {
                btn.classList.toggle('active', btn.id === `admin-day-${currentDay}`);
            });

            const list = document.getElementById('admin-item-list');
            list.innerHTML = items.map((item, i) => `
                <div class="p-3 bg-gray-50 rounded-xl border border-gray-200">
                    <div class="flex gap-2 mb-2">
                        <input type="text" value="${item.name}" onchange="items[${i}].name=this.value" class="flex-1 p-2 rounded-lg border font-bold text-[10px]" placeholder="상품명">
                        <div class="flex items-center gap-1 bg-white border rounded-lg px-2">
                            <span class="text-[8px] font-black text-gray-300">재고</span>
                            <input type="number" value="${item.stock}" onchange="items[${i}].stock=parseInt(this.value)" class="w-10 p-1 text-center font-black text-[10px] outline-none">
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex gap-1">
                            ${['목', '금', '토', '일'].map(d => `
                                <button onclick="toggleDay(${i}, '${d}')" 
                                    class="w-6 h-6 rounded text-[8px] font-black border ${item.days.includes(d) ? 'bg-black text-[#FFB800] border-black' : 'bg-white text-gray-300 border-gray-200'}">
                                    ${d}
                                </button>
                            `).join('')}
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="color" value="${item.color}" onchange="items[${i}].color=this.value" class="w-5 h-5 cursor-pointer rounded">
                            <button onclick="items.splice(${i}, 1); showSettings();" class="text-red-400 text-xs"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('admin-settings-modal').classList.add('active');
        }

        function addItem() {
            items.push({ id: Date.now(), name: "신규 상품", stock: 10, color: "#ffffff", days: [currentDay] });
            showSettings();
        }

        function saveAndReload() {
            localStorage.setItem('lucky_draw_v9_items', JSON.stringify(items));
            localStorage.setItem('lucky_draw_v9_day', currentDay);
            location.reload();
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        window.onload = () => {
            updateDayUI();
            renderWheel();
            checkParticipation();
        };
    </script>
</body>
</html>
